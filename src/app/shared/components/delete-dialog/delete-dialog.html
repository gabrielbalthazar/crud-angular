<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button [mat-dialog-close]="false">
    {{ data.cancelButtonText || 'Cancelar' }}
  </button>

  <button mat-flat-button color="warn" [mat-dialog-close]="true">
    {{ data.confirmButtonText || 'Ok' }}
  </button>
</mat-dialog-actions>
