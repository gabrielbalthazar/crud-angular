<mat-toolbar>Cadastro de Cursos</mat-toolbar>
<mat-card>
  <form [formGroup]="form">
    <mat-form-field>
      <input
      matInput
      placeholder="Nome"
      formControlName="nome"
      >
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Categoria" formControlName="categoria">
    </mat-form-field>
  </form>
  <mat-card-actions>
    <button mat-raised-button (click)="returnButton();">Retornar</button>
    <button matButton="filled" mat-raised-button color="primary" (click)="onSubmit();" >Salvar</button>
  </mat-card-actions>
</mat-card>
