<mat-toolbar>Listagem de Cursos</mat-toolbar>
<mat-card>
  <div class="header-table">
    <button matButton="filled" (click)="onAddCurso();">Adicionar Curso</button>
    <mat-form-field>
      <mat-label>Filter</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Pesquise" #input>
    </mat-form-field>

  </div>
  <div *ngIf="isLoading">
    <mat-spinner></mat-spinner>
  </div>

  <div class="mat-elevation-z8" [hidden]="isLoading">

    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let row"> {{row.id}} </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
        <td mat-cell *matCellDef="let row"> {{row.nome}} </td>
      </ng-container>

      <ng-container matColumnDef="categoria">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Categoria </th>
        <td mat-cell *matCellDef="let row"> {{row.categoria}} </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef> Ações </th>
        <td mat-cell *matCellDef="let row" class="action-column">

          <button mat-icon-button color="primary" title="Editar curso">
            <mat-icon color="primary">edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" title="Excluir curso">
            <mat-icon color="warn">delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="3">
          Nenhum registro a partir do filtro "{{input.value}}"
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Selecione quantos cursos por página">
    </mat-paginator>
  </div>

</mat-card>
